spring.application.name=timesheet-service

# H2 database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring JPA config
spring.datasource.url=jdbc:h2:mem:timesheetdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

external.timesheet.api.base-url=https://REPLACE-WITH-YOUR-ENDPOINT.amazonaws.com/prod
external.timesheet.api.resource-path=/timesheets