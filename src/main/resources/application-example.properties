spring.application.name=timesheet-service

# H2 database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring JPA config
spring.datasource.url=jdbc:h2:mem:timesheetdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

external.timesheet.api.base-url=https://REPLACE-WITH-YOUR-ENDPOINT.amazonaws.com/prod
external.timesheet.api.resource-path=/timesheets

# Change this property to true, if you want to execute the scheduler after startup
scheduler.fetch-external-timesheets.enabled=false

# Change this property to true, if you want to simulate a super-slow database, that needs 10 seconds to write entities
app.simulate-slow-database=false